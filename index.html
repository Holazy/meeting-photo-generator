<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>腾讯会议合影生成器</title>
https://holazy.github.io/meeting-photo-generator/    <script src="https://cdn.jsdelivr.net/npm/dom-to-image@2.6.0/dist/dom-to-image.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
            background: #f5f7fa;
            min-height: 100vh;
            color: #333;
        }

        .app-container {
            display: flex;
            min-height: 100vh;
        }

        .control-panel {
            width: 320px;
            background: #fff;
            padding: 24px;
            box-shadow: 2px 0 8px rgba(0,0,0,0.08);
            display: flex;
            flex-direction: column;
            gap: 24px;
            overflow-y: auto;
        }

        .panel-title {
            font-size: 20px;
            font-weight: 600;
            color: #1890ff;
            padding-bottom: 16px;
            border-bottom: 2px solid #e8f4ff;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .panel-title::before {
            content: "◈";
            font-size: 18px;
        }

        .section {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .section-label {
            font-size: 14px;
            font-weight: 600;
            color: #333;
        }

        .grid-options {
            display: flex;
            gap: 8px;
        }

        .grid-btn {
            flex: 1;
            padding: 12px 8px;
            border: 2px solid #e0e0e0;
            background: #fff;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            color: #666;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .grid-btn:hover {
            border-color: #1890ff;
            color: #1890ff;
        }

        .grid-btn.active {
            border-color: #1890ff;
            background: #e6f7ff;
            color: #1890ff;
        }

        .grid-btn span {
            font-size: 18px;
        }

        .export-btn {
            margin-top: auto;
            padding: 14px 24px;
            background: linear-gradient(135deg, #1890ff 0%, #096dd9 100%);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(24, 144, 255, 0.3);
        }

        .export-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(24, 144, 255, 0.4);
        }

        .export-btn:active {
            transform: translateY(0);
        }

        .upload-area {
            border: 2px dashed #d9d9d9;
            border-radius: 8px;
            padding: 24px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #fafafa;
        }

        .upload-area:hover {
            border-color: #1890ff;
            background: #e6f7ff;
        }

        .upload-area.dragover {
            border-color: #1890ff;
            background: #e6f7ff;
            transform: scale(1.02);
        }

        .upload-icon {
            font-size: 32px;
            margin-bottom: 8px;
        }

        .upload-text {
            font-size: 14px;
            color: #666;
            margin-bottom: 4px;
        }

        .upload-hint {
            font-size: 12px;
            color: #999;
        }

        .bg-preview {
            margin-top: 12px;
            max-width: 100%;
            max-height: 120px;
            border-radius: 4px;
            display: none;
        }

        .bg-preview.show {
            display: block;
        }

        .preview-area {
            flex: 1;
            padding: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }

        .preview-header {
            font-size: 18px;
            font-weight: 600;
            color: #333;
        }

        .grid-container {
            display: grid;
            gap: 1px;
            background: #000;
            box-shadow: 0 4px 16px rgba(0,0,0,0.1);
            width: 90vw;
            max-width: 1400px;
        }

        .grid-cell {
            position: relative;
            overflow: hidden;
            cursor: pointer;
            background-size: cover;
            background-position: center;
            background-color: #e8e8e8;
            aspect-ratio: 16 / 9;
        }

        .cell-avatar {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 70%;
            height: 62%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1;
        }

        .cell-avatar img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .grid-cell:hover {
            z-index: 1;
            outline: 2px solid #1890ff;
        }

        .cell-avatar {
            position: absolute;
            bottom: 12%;
            left: 50%;
            transform: translateX(-50%);
            width: 75%;
            height: 65%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .cell-avatar img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .cell-avatar-placeholder {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: rgba(255,255,255,0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: #bbb;
        }

        .cell-name-box {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 10%;
            background: rgba(0,0,0,0.7);
            display: flex;
            align-items: center;
            padding: 0 8px;
            gap: 4px;
            width: auto;
            min-width: 30%;
            max-width: 60%;
            font-size: 100%;
        }

        .cell-mic-icon {
            flex-shrink: 0;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 14px;
            height: 14px;
        }

        .cell-mic-icon svg {
            width: 10px;
            height: 14px;
            fill: #fff;
        }

        .cell-name-input {
            flex: 1;
            background: transparent;
            border: none;
            color: #fff;
            font-size: calc(100% * 0.7);
            text-align: left;
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            outline: none;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            line-height: 1;
            height: 14px;
            padding: 0;
            margin: 0;
            display: flex;
            align-items: center;
        }

        .cell-name-input::placeholder {
            color: rgba(255,255,255,0.5);
        }

        .cell-upload-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 10%;
            background: rgba(0,0,0,0.5);
            display: none;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 14px;
        }

        .grid-cell:hover .cell-upload-overlay {
            display: flex;
        }

        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 16px;
            z-index: 1000;
        }

        .loading-overlay.active {
            display: flex;
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            color: #fff;
            font-size: 16px;
        }

        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: #333;
            color: #fff;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s ease;
            z-index: 1001;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        .toast.success {
            background: #52c41a;
        }

        .toast.error {
            background: #ff4d4f;
        }

        .hidden-input {
            display: none;
        }

        .tips {
            font-size: 12px;
            color: #999;
            padding: 12px;
            background: #f9f9f9;
            border-radius: 8px;
            line-height: 1.6;
        }

        .tips strong {
            color: #666;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="control-panel">
            <div class="panel-title">腾讯会议合影生成器</div>
            
            <div class="section">
                <div class="section-label">选择行数 (4×n)</div>
                <div class="grid-options">
                    <button class="grid-btn active" data-grid="8">
                        <span>▦▦</span>
                        4×2 (8人)
                    </button>
                    <button class="grid-btn" data-grid="12">
                        <span>▦▦▦</span>
                        4×3 (12人)
                    </button>
                    <button class="grid-btn" data-grid="16">
                        <span>▦▦▦▦</span>
                        4×4 (16人)
                    </button>
                    <button class="grid-btn" data-grid="20">
                        <span>▦▦▦▦▦</span>
                        4×5 (20人)
                    </button>
                </div>
            </div>

            <div class="section">
                <div class="section-label">上传背景图片</div>
                <div class="upload-area" id="bgUpload">
                    <div class="upload-icon">🖼️</div>
                    <div class="upload-text">点击或拖拽上传背景</div>
                    <div class="upload-hint">支持 JPG、PNG 格式</div>
                </div>
                <img class="bg-preview" id="bgPreview" alt="背景预览">
            </div>

            <div class="tips">
                <strong>使用说明：</strong><br>
                1. 选择行数 (4×n)<br>
                2. 上传背景图片（可选）<br>
                3. 点击或拖拽上传人物头像<br>
                4. 在左下角输入参会人姓名<br>
                5. 点击导出按钮保存合影
                <br><br>
                <button class="export-btn" id="exportBtn">📥 导出合影</button>
            </div>
        </div>

        <div class="preview-area">
            <div class="preview-header">合影预览</div>
            <div class="grid-container" id="gridContainer"></div>
        </div>
    </div>

    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner"></div>
        <div class="loading-text" id="loadingText">正在处理...</div>
    </div>

    <div class="toast" id="toast"></div>

    <input type="file" class="hidden-input" id="avatarInput" accept="image/*">

    <script>
        const state = {
            gridType: 8,
            cells: [],
            backgroundImage: null
        };

        const gridConfigs = {
            8: { cols: 4, rows: 2 },
            12: { cols: 4, rows: 3 },
            16: { cols: 4, rows: 4 },
            20: { cols: 4, rows: 5 }
        };

        function init() {
            setupEventListeners();
            renderGrid();
        }

        function setupEventListeners() {
            document.querySelectorAll('.grid-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.grid-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    state.gridType = parseInt(btn.dataset.grid);
                    state.cells = [];
                    renderGrid();
                });
            });

            document.getElementById('exportBtn').addEventListener('click', exportImage);

            setupBackgroundUpload();
        }

        function setupBackgroundUpload() {
            const uploadArea = document.getElementById('bgUpload');
            const bgPreview = document.getElementById('bgPreview');
            const hiddenInput = document.createElement('input');
            hiddenInput.type = 'file';
            hiddenInput.accept = 'image/*';
            
            uploadArea.addEventListener('click', () => {
                hiddenInput.click();
            });

            hiddenInput.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (file) {
                    handleBackgroundUpload(file);
                }
            });

            uploadArea.addEventListener('dragover', (e) => {
                e.preventDefault();
                uploadArea.classList.add('dragover');
            });

            uploadArea.addEventListener('dragleave', () => {
                uploadArea.classList.remove('dragover');
            });

            uploadArea.addEventListener('drop', (e) => {
                e.preventDefault();
                uploadArea.classList.remove('dragover');
                const file = e.dataTransfer.files[0];
                if (file && file.type.startsWith('image/')) {
                    handleBackgroundUpload(file);
                }
            });

            async function handleBackgroundUpload(file) {
                showLoading('正在上传背景...');
                const reader = new FileReader();
                reader.onload = (e) => {
                    state.backgroundImage = e.target.result;
                    bgPreview.src = e.target.result;
                    bgPreview.classList.add('show');
                    renderGrid();
                    hideLoading();
                    showToast('背景图片上传成功', 'success');
                };
                reader.readAsDataURL(file);
            }
        }

        function renderGrid() {
            const config = gridConfigs[state.gridType];
            const container = document.getElementById('gridContainer');
            
            container.style.gridTemplateColumns = `repeat(${config.cols}, 1fr)`;
            container.style.gridTemplateRows = `repeat(${config.rows}, 1fr)`;
            container.innerHTML = '';

            for (let i = 0; i < state.gridType; i++) {
                const cell = state.cells[i] || { avatar: null, name: '' };
                
                const cellEl = document.createElement('div');
                cellEl.className = 'grid-cell';
                
                if (state.backgroundImage) {
                    cellEl.style.backgroundImage = `url(${state.backgroundImage})`;
                }

                if (cell.avatar) {
                    const avatarDiv = document.createElement('div');
                    avatarDiv.className = 'cell-avatar';
                    const avatarImg = document.createElement('img');
                    avatarImg.src = cell.avatar;
                    avatarDiv.appendChild(avatarImg);
                    cellEl.appendChild(avatarDiv);
                }

                const overlay = document.createElement('div');
                overlay.className = 'cell-upload-overlay';
                overlay.innerHTML = cell.avatar ? '更换头像' : '点击上传头像';
                overlay.addEventListener('click', (e) => {
                    e.stopPropagation();
                    openAvatarUpload(i);
                });

                const nameBox = document.createElement('div');
                nameBox.className = 'cell-name-box';
                
                const micIcon = document.createElement('span');
                micIcon.className = 'cell-mic-icon';
                micIcon.innerHTML = '<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>';
                
                const nameInput = document.createElement('input');
                nameInput.type = 'text';
                nameInput.className = 'cell-name-input';
                nameInput.placeholder = '姓名 院校名称';
                nameInput.value = cell.name;
                nameInput.maxLength = 30;
                nameInput.addEventListener('input', (e) => {
                    state.cells[i] = state.cells[i] || { avatar: null, name: '' };
                    state.cells[i].name = e.target.value;
                });
                nameInput.addEventListener('click', (e) => e.stopPropagation());

                nameBox.appendChild(micIcon);
                nameBox.appendChild(nameInput);

                cellEl.appendChild(overlay);
                cellEl.appendChild(nameBox);
                cellEl.addEventListener('click', () => openAvatarUpload(i));

                container.appendChild(cellEl);
            }
        }

        function openAvatarUpload(index) {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.onchange = async (e) => {
                const file = e.target.files[0];
                if (file) {
                    await handleAvatarUpload(index, file);
                }
            };
            input.click();
        }

        async function handleAvatarUpload(index, file) {
            showLoading('正在处理，请稍候...');
            
            const reader = new FileReader();
            reader.onload = async (e) => {
                try {
                    const response = await fetch(e.target.result);
                    const blob = await response.blob();
                    const url = URL.createObjectURL(blob);
                    
                    state.cells[index] = state.cells[index] || { avatar: null, name: '' };
                    state.cells[index].avatar = url;
                    
                    renderGrid();
                    hideLoading();
                    showToast('头像上传成功', 'success');
                } catch (error) {
                    console.error('处理失败:', error);
                    hideLoading();
                    
                    state.cells[index] = state.cells[index] || { avatar: null, name: '' };
                    state.cells[index].avatar = e.target.result;
                    renderGrid();
                    showToast('头像上传成功', 'error');
                }
            };
            reader.readAsDataURL(file);
        }

        async function exportImage() {
            showLoading('正在导出，请稍候...');
            
            const container = document.getElementById('gridContainer');
            
            try {
                const dataUrl = await domtoimage.toPng(container, {
                    quality: 1,
                    pixelRatio: 4,
                    bgcolor: '#000000',
                    style: {
                        transform: 'scale(1)',
                        transformOrigin: 'top left'
                    }
                });
                
                const link = document.createElement('a');
                link.download = `会议合影_${state.gridType}宫格.png`;
                link.href = dataUrl;
                link.click();
                
                hideLoading();
                showToast('合影导出成功', 'success');
            } catch (error) {
                console.error('导出失败:', error);
                hideLoading();
                showToast('导出失败', 'error');
            }
        }

        function loadImage(src) {
            return new Promise((resolve, reject) => {
                const img = new Image();
                img.onload = () => resolve(img);
                img.onerror = reject;
                img.src = src;
            });
        }

        function showLoading(text) {
            document.getElementById('loadingText').textContent = text;
            document.getElementById('loadingOverlay').classList.add('active');
        }

        function hideLoading() {
            document.getElementById('loadingOverlay').classList.remove('active');
        }

        function showToast(message, type = '') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast ' + type;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
            if (w < 2 * r) r = w / 2;
            if (h < 2 * r) r = h / 2;
            this.beginPath();
            this.moveTo(x + r, y);
            this.arcTo(x + w, y, x + w, y + h, r);
            this.arcTo(x + w, y + h, x, y + h, r);
            this.arcTo(x, y + h, x, y, r);
            this.arcTo(x, y, x + w, y, r);
            this.closePath();
            return this;
        };

        init();
    </script>
</body>
</html>
