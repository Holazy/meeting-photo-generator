<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>腾讯会议合影生成器</title>
    <script src="https://cdn.jsdelivr.net/npm/dom-to-image@2.6.0/dist/dom-to-image.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
            background: #f5f7fa;
            min-height: 100vh;
            color: #333;
        }

        .app-container {
            display: flex;
            min-height: 100vh;
        }

        .control-panel {
            width: 320px;
            background: #fff;
            padding: 24px;
            box-shadow: 2px 0 8px rgba(0,0,0,0.08);
            display: flex;
            flex-direction: column;
            gap: 24px;
            overflow-y: auto;
        }

        .panel-title {
            font-size: 20px;
            font-weight: 600;
            color: #1890ff;
            padding-bottom: 16px;
            border-bottom: 2px solid #e8f4ff;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .panel-title::before {
            content: "◈";
            font-size: 18px;
        }

        .section {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .section-label {
            font-size: 14px;
            font-weight: 600;
            color: #333;
        }

        .grid-options {
            display: flex;
            gap: 8px;
        }

        .grid-btn {
            flex: 1;
            padding: 12px 8px;
            border: 2px solid #e0e0e0;
            background: #fff;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            color: #666;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .grid-btn:hover {
            border-color: #1890ff;
            color: #1890ff;
        }

        .grid-btn.active {
            border-color: #1890ff;
            background: #e6f7ff;
            color: #1890ff;
        }

        .grid-btn span {
            font-size: 18px;
        }

        .export-btn {
            margin-top: auto;
            padding: 14px 24px;
            background: linear-gradient(135deg, #1890ff 0%, #096dd9 100%);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(24, 144, 255, 0.3);
        }

        .export-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(24, 144, 255, 0.4);
        }

        .export-btn:active {
            transform: translateY(0);
        }

        .preview-area {
            flex: 1;
            padding: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }

        .preview-header {
            font-size: 18px;
            font-weight: 600;
            color: #333;
        }

        .grid-container {
            display: grid;
            gap: 1px;
            background: #000;
            box-shadow: 0 4px 16px rgba(0,0,0,0.1);
            width: 80vw;
            max-width: 1200px;
            aspect-ratio: 4 / 3;
        }

        .grid-cell {
            position: relative;
            overflow: hidden;
            cursor: pointer;
            background-size: cover;
            background-position: center;
            background-color: #e8e8e8;
        }

        .grid-cell:hover {
            z-index: 1;
            outline: 2px solid #1890ff;
        }

        .cell-avatar {
            position: absolute;
            bottom: 12%;
            left: 50%;
            transform: translateX(-50%);
            width: 75%;
            height: 65%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .cell-avatar img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .cell-avatar-placeholder {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: rgba(255,255,255,0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: #bbb;
        }

        .cell-name-box {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 10%;
            background: rgba(0,0,0,0.7);
            display: inline-flex;
            align-items: center;
            padding: 0 12px;
            gap: 4px;
            max-width: 100%;
            box-sizing: border-box;
            font-size: 100%;
        }

        .cell-mic-icon {
            flex-shrink: 0;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 14px;
            height: 14px;
        }

        .cell-mic-icon svg {
            width: 10px;
            height: 14px;
            fill: #fff;
        }

        .cell-name-input {
            color: #fff;
            font-size: calc(100% * 0.7);
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            line-height: 1;
            height: 14px;
            outline: none;
            white-space: nowrap;
            overflow: hidden;
            min-width: 2em;
            max-width: calc(100vw);
            cursor: text;
        }

        .cell-name-input:empty::before {
            content: attr(data-placeholder);
            color: rgba(255,255,255,0.5);
            pointer-events: none;
        }

        .cell-upload-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 10%;
            background: rgba(0,0,0,0.5);
            display: none;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 14px;
        }

        .grid-cell:hover .cell-upload-overlay {
            display: flex;
        }

        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 16px;
            z-index: 1000;
        }

        .loading-overlay.active {
            display: flex;
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            color: #fff;
            font-size: 16px;
        }

        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: #333;
            color: #fff;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s ease;
            z-index: 1001;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        .toast.success {
            background: #52c41a;
        }

        .toast.error {
            background: #ff4d4f;
        }

        .hidden-input {
            display: none;
        }

        .tips {
            font-size: 12px;
            color: #999;
            padding: 12px;
            background: #f9f9f9;
            border-radius: 8px;
            line-height: 1.6;
        }

        .tips strong {
            color: #666;
        }

        .version-link {
            display: inline-block;
            margin-top: 12px;
            color: #1890ff;
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
            transition: color 0.3s;
        }

        .version-link:hover {
            color: #40a9ff;
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="control-panel">
            <div class="panel-title">腾讯会议合影生成器</div>
            
            <div class="section">
                <div class="section-label">选择宫格</div>
                <div class="grid-options">
                    <button class="grid-btn active" data-grid="9">
                        <span>▦</span>
                        9宫格
                    </button>
                    <button class="grid-btn" data-grid="20">
                        <span>▦▦</span>
                        20宫格
                    </button>
                    <button class="grid-btn" data-grid="25">
                        <span>▦▦▦</span>
                        25宫格
                    </button>
                </div>
            </div>

            <div class="tips">
                <strong>使用说明：</strong><br>
                1. 选择宫格数量<br>
                2. 点击每个格子上传人物头像<br>
                3. 在左下角输入参会人姓名<br>
                4. 点击导出按钮保存合影
                <br><br>
                <button class="export-btn" id="exportBtn">📥 导出合影</button>
                <a href="advanced.html" class="version-link">✨ 切换到增强版 (支持自由拖拽/背景自定义)</a>
            </div>
        </div>

        <div class="preview-area">
            <div class="preview-header">合影预览</div>
            <div class="grid-container" id="gridContainer"></div>
        </div>
    </div>

    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner"></div>
        <div class="loading-text" id="loadingText">正在处理...</div>
    </div>

    <div class="toast" id="toast"></div>

    <input type="file" class="hidden-input" id="avatarInput" accept="image/*">

    <script>
        const state = {
            gridType: 9,
            cells: []
        };

        const gridConfigs = {
            9: { cols: 3, rows: 3, width: 280, height: 210 },
            20: { cols: 4, rows: 5, width: 220, height: 165 },
            25: { cols: 5, rows: 5, width: 200, height: 150 }
        };

        function init() {
            setupEventListeners();
            renderGrid();
        }

        function setupEventListeners() {
            document.querySelectorAll('.grid-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.grid-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    state.gridType = parseInt(btn.dataset.grid);
                    state.cells = [];
                    renderGrid();
                });
            });

            document.getElementById('exportBtn').addEventListener('click', exportImage);
        }

        function renderGrid() {
            const config = gridConfigs[state.gridType];
            const container = document.getElementById('gridContainer');
            
            container.style.gridTemplateColumns = `repeat(${config.cols}, 1fr)`;
            container.style.gridTemplateRows = `repeat(${config.rows}, 1fr)`;
            container.innerHTML = '';

            for (let i = 0; i < state.gridType; i++) {
                const cell = state.cells[i] || { avatar: null, name: '' };
                
                const cellEl = document.createElement('div');
                cellEl.className = 'grid-cell';
                
                if (cell.avatar) {
                    cellEl.style.backgroundImage = `url(${cell.avatar})`;
                }

                const overlay = document.createElement('div');
                overlay.className = 'cell-upload-overlay';
                overlay.innerHTML = cell.avatar ? '更换头像' : '点击上传头像';
                overlay.addEventListener('click', (e) => {
                    e.stopPropagation();
                    openAvatarUpload(i);
                });

                const nameBox = document.createElement('div');
                nameBox.className = 'cell-name-box';
                
                const micIcon = document.createElement('span');
                micIcon.className = 'cell-mic-icon';
                micIcon.innerHTML = '<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>';
                
                const nameInput = document.createElement('span');
                nameInput.className = 'cell-name-input';
                nameInput.contentEditable = 'true';
                nameInput.dataset.placeholder = '姓名 院校名称';
                nameInput.textContent = cell.name || '';
                nameInput.addEventListener('input', (e) => {
                    state.cells[i] = state.cells[i] || { avatar: null, name: '' };
                    state.cells[i].name = e.target.textContent;
                });
                nameInput.addEventListener('click', (e) => e.stopPropagation());

                nameBox.appendChild(micIcon);
                nameBox.appendChild(nameInput);

                cellEl.appendChild(overlay);
                cellEl.appendChild(nameBox);
                cellEl.addEventListener('click', () => openAvatarUpload(i));

                container.appendChild(cellEl);
            }
        }

        function openAvatarUpload(index) {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.onchange = async (e) => {
                const file = e.target.files[0];
                if (file) {
                    await handleAvatarUpload(index, file);
                }
            };
            input.click();
        }

        async function handleAvatarUpload(index, file) {
            showLoading('正在处理，请稍候...');
            
            const reader = new FileReader();
            reader.onload = async (e) => {
                try {
                    const response = await fetch(e.target.result);
                    const blob = await response.blob();
                    const url = URL.createObjectURL(blob);
                    
                    state.cells[index] = state.cells[index] || { avatar: null, name: '' };
                    state.cells[index].avatar = url;
                    
                    renderGrid();
                    hideLoading();
                    showToast('头像上传成功', 'success');
                } catch (error) {
                    console.error('处理失败:', error);
                    hideLoading();
                    
                    state.cells[index] = state.cells[index] || { avatar: null, name: '' };
                    state.cells[index].avatar = e.target.result;
                    renderGrid();
                    showToast('头像上传成功', 'error');
                }
            };
            reader.readAsDataURL(file);
        }

        async function exportImage() {
            showLoading('正在导出，请稍候...');
            
            const container = document.getElementById('gridContainer');
            
            try {
                const dataUrl = await domtoimage.toPng(container, {
                    quality: 1,
                    pixelRatio: 4,
                    bgcolor: '#000000',
                    style: {
                        transform: 'scale(1)',
                        transformOrigin: 'top left'
                    }
                });
                
                const link = document.createElement('a');
                link.download = `会议合影_${state.gridType}宫格.png`;
                link.href = dataUrl;
                link.click();
                
                hideLoading();
                showToast('合影导出成功', 'success');
            } catch (error) {
                console.error('导出失败:', error);
                hideLoading();
                showToast('导出失败', 'error');
            }
        }

        function loadImage(src) {
            return new Promise((resolve, reject) => {
                const img = new Image();
                img.onload = () => resolve(img);
                img.onerror = reject;
                img.src = src;
            });
        }

        function showLoading(text) {
            document.getElementById('loadingText').textContent = text;
            document.getElementById('loadingOverlay').classList.add('active');
        }

        function hideLoading() {
            document.getElementById('loadingOverlay').classList.remove('active');
        }

        function showToast(message, type = '') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast ' + type;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
            if (w < 2 * r) r = w / 2;
            if (h < 2 * r) r = h / 2;
            this.beginPath();
            this.moveTo(x + r, y);
            this.arcTo(x + w, y, x + w, y + h, r);
            this.arcTo(x + w, y + h, x, y + h, r);
            this.arcTo(x, y + h, x, y, r);
            this.arcTo(x, y, x + w, y, r);
            this.closePath();
            return this;
        };

        init();
    </script>
</body>
</html>
