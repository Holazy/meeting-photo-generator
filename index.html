<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>腾讯会议合影生成器</title>
    <script src="https://cdn.jsdelivr.net/npm/dom-to-image@2.6.0/dist/dom-to-image.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
            background: #f5f7fa;
            min-height: 100vh;
            color: #333;
            overflow-x: hidden;
        }

        .app-container {
            display: flex;
            min-height: 100vh;
            max-width: 100vw;
        }

        .control-panel {
            width: 18%;
            min-width: 180px;
            max-width: 500px;
            background: #fff;
            padding: 24px;
            box-shadow: 2px 0 8px rgba(0,0,0,0.08);
            display: flex;
            flex-direction: column;
            gap: 20px;
            overflow-y: auto;
        }

        .panel-title {
            font-size: 20px;
            font-weight: 600;
            color: #1890ff;
            padding-bottom: 16px;
            border-bottom: 2px solid #e8f4ff;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .panel-title::before {
            content: "◈";
            font-size: 18px;
        }

        .section {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .section-label {
            font-size: 14px;
            font-weight: 600;
            color: #333;
        }

        .grid-options {
            display: flex;
            gap: 8px;
        }

        .grid-btn {
            flex: 1;
            padding: 12px 8px;
            border: 2px solid #e0e0e0;
            background: #fff;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            color: #666;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .grid-btn:hover {
            border-color: #1890ff;
            color: #1890ff;
        }

        .grid-btn.active {
            border-color: #1890ff;
            background: #e6f7ff;
            color: #1890ff;
        }

        .grid-btn span {
            font-size: 18px;
        }

        .layout-info {
            text-align: center;
            padding: 10px;
            background: #f5f5f5;
            border-radius: 8px;
            font-size: 14px;
            color: #666;
        }

        .row-col-controls {
            display: flex;
            gap: 6px;
        }

        .row-col-btn {
            flex: 1;
            padding: 10px 6px;
            border: 1px solid #d9d9d9;
            border-radius: 6px;
            background: #fff;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 13px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
        }

        .row-col-btn:hover {
            background: #f5f5f5;
            border-color: #1890ff;
            color: #1890ff;
        }

        .row-col-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .export-btn {
            margin-top: auto;
            padding: 14px 24px;
            background: linear-gradient(135deg, #1890ff 0%, #096dd9 100%);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(24, 144, 255, 0.3);
        }

        .export-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(24, 144, 255, 0.4);
        }

        .export-btn:active {
            transform: translateY(0);
        }

        .preview-area {
            flex: 1;
            padding: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            min-width: 0;
        }

        .preview-header {
            font-size: 18px;
            font-weight: 600;
            color: #333;
        }

        .grid-container {
            display: grid;
            gap: 1px;
            background: #000;
            box-shadow: 0 4px 16px rgba(0,0,0,0.1);
            width: 100%;
        }

        .grid-cell {
            position: relative;
            overflow: hidden;
            cursor: pointer;
            background-size: cover;
            background-position: center;
            background-color: #e8e8e8;
            aspect-ratio: 16 / 9;
        }

        .grid-cell:hover {
            z-index: 1;
            outline: 2px solid #1890ff;
        }

        .grid-cell.drag-over {
            outline: 3px solid #52c41a;
            background-color: #f0fff0;
        }

        .cell-avatar {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: calc(100% - 0%);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .cell-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            cursor: grab;
            user-select: none;
            pointer-events: auto;
            transition: transform 0.05s ease;
        }

        .cell-avatar img:active {
            cursor: grabbing;
        }

        .cell-name-box {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 10%;
            background: rgba(0,0,0,0.7);
            display: inline-flex;
            align-items: center;
            padding: 0 12px;
            gap: 4px;
            max-width: 100%;
            box-sizing: border-box;
            font-size: 100%;
            z-index: 30;
        }

        .cell-mic-icon {
            flex-shrink: 0;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 14px;
            height: 14px;
        }

        .cell-mic-icon svg {
            width: 10px;
            height: 14px;
            fill: #fff;
        }

        .cell-name-input {
            color: #fff;
            font-size: calc(100% * 0.7);
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            line-height: 1;
            height: 14px;
            outline: none;
            white-space: nowrap;
            overflow: hidden;
            min-width: 2em;
            max-width: calc(100vw);
            cursor: text;
        }

        .cell-name-input:empty::before {
            content: attr(data-placeholder);
            color: rgba(255,255,255,0.5);
            pointer-events: none;
        }

        .cell-upload-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 10%;
            background: rgba(0,0,0,0.5);
            display: none;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 14px;
            z-index: 25;
            pointer-events: none;
        }

        .grid-cell:hover .cell-upload-overlay {
            display: flex;
        }

        .upload-trigger {
            cursor: pointer;
            pointer-events: auto;
            padding: 8px 16px;
            background: rgba(24, 144, 255, 0.8);
            border-radius: 4px;
            font-size: 13px;
        }

        .image-controls {
            position: absolute;
            top: 4px;
            right: 4px;
            display: none;
            gap: 3px;
            z-index: 30;
            flex-direction: row;
        }

        .grid-cell:hover .image-controls {
            display: flex;
        }

        .direction-controls {
            position: absolute;
            bottom: 14%;
            right: 4px;
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            z-index: 30;
        }

        .direction-row {
            display: flex;
            gap: 2px;
        }

        .grid-cell:hover .direction-controls {
            display: flex;
        }

        .control-btn {
            width: 28px;
            height: 28px;
            background: rgba(0,0,0,0.7);
            border: none;
            border-radius: 4px;
            color: #fff;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s ease;
            line-height: 1;
        }

        .control-btn:hover {
            background: rgba(24, 144, 255, 0.9);
        }

        .control-btn:active {
            background: rgba(0, 0, 0, 0.9);
        }

        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 16px;
            z-index: 1000;
        }

        .loading-overlay.active {
            display: flex;
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            color: #fff;
            font-size: 16px;
        }

        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: #333;
            color: #fff;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s ease;
            z-index: 1001;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        .toast.success {
            background: #52c41a;
        }

        .toast.error {
            background: #ff4d4f;
        }

        .hidden-input {
            display: none;
        }

        .tips {
            font-size: 12px;
            color: #999;
            padding: 12px;
            background: #f9f9f9;
            border-radius: 8px;
            line-height: 1.6;
        }

        .tips strong {
            color: #666;
        }

        .nav-links {
            text-align: center;
            padding-top: 12px;
            border-top: 1px solid #f0f0f0;
        }

        .nav-link {
            color: #1890ff;
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
            transition: color 0.3s;
        }

        .nav-link:hover {
            color: #40a9ff;
            text-decoration: underline;
        }

        .global-drop-zone {
            border: 3px dashed #d9d9d9;
            border-radius: 12px;
            padding: 16px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #fafafa;
            font-size: 13px;
            color: #999;
        }

        .global-drop-zone:hover {
            border-color: #1890ff;
            background: #e6f7ff;
            color: #1890ff;
        }

        .global-drop-zone.dragover {
            border-color: #52c41a;
            background: #f0fff0;
            color: #52c41a;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="control-panel">
            <div class="panel-title">腾讯会议合影生成器</div>
            
            <div class="section">
                <div class="section-label">选择布局</div>
                <div class="grid-options">
                    <button class="grid-btn active" data-grid="9">
                        <span>▦</span>
                        3×3
                    </button>
                    <button class="grid-btn" data-grid="12">
                        <span>▦</span>
                        4×3
                    </button>
                    <button class="grid-btn" data-grid="20">
                        <span>▦</span>
                        5×4
                    </button>
                </div>
            </div>

            <div class="section">
                <div class="section-label">调整行列</div>
                <div class="layout-info" id="layoutInfo">当前: 3列 × 3行 (9人)</div>
                <div class="row-col-controls">
                    <button class="row-col-btn" id="addRowBtn" title="增加一行">
                        ＋ 行
                    </button>
                    <button class="row-col-btn" id="removeRowBtn" title="减少一行">
                        － 行
                    </button>
                    <button class="row-col-btn" id="addColBtn" title="增加一列">
                        ＋ 列
                    </button>
                    <button class="row-col-btn" id="removeColBtn" title="减少一列">
                        － 列
                    </button>
                </div>
            </div>

            <div class="section">
                <div class="section-label">批量导入</div>
                <div class="global-drop-zone" id="globalDropZone">
                    拖拽图片到此处批量导入<br>
                    <span style="font-size:11px;">按顺序填充到空白格子</span>
                </div>
            </div>

            <div class="tips">
                <strong>使用说明：</strong><br>
                1. 选择布局或手动调整行列数<br>
                2. 点击格子上传头像，或直接拖拽图片到格子<br>
                3. 悬停单元格：↑↓←→ 调整位置，+/- 调整大小，↺ 重置<br>
                4. 直接在单元格内拖拽图片可移动位置<br>
                5. 拖拽多张图片到批量导入区可依次填充<br>
                6. 输入姓名后点击导出合影
            </div>

            <button class="export-btn" id="exportBtn">📥 导出合影</button>

            <div class="nav-links">
                <a href="advanced.html" class="nav-link">✨ 切换到增强版 (支持自由拖拽/背景自定义)</a>
            </div>
        </div>

        <div class="preview-area">
            <div class="preview-header">合影预览</div>
            <div class="grid-container" id="gridContainer"></div>
        </div>
    </div>

    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner"></div>
        <div class="loading-text" id="loadingText">正在处理...</div>
    </div>

    <div class="toast" id="toast"></div>

    <input type="file" class="hidden-input" id="avatarInput" accept="image/*">

    <script>
        const state = {
            cols: 3,
            rows: 3,
            cells: [],
            avatarTransforms: {}
        };

        const presetConfigs = {
            9: { cols: 3, rows: 3 },
            12: { cols: 4, rows: 3 },
            20: { cols: 5, rows: 4 }
        };

        function init() {
            setupEventListeners();
            renderGrid();
        }

        function setupEventListeners() {
            document.querySelectorAll('.grid-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.grid-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    const config = presetConfigs[parseInt(btn.dataset.grid)];
                    state.cols = config.cols;
                    state.rows = config.rows;
                    state.cells = [];
                    state.avatarTransforms = {};
                    renderGrid();
                    updateLayoutInfo();
                });
            });

            document.getElementById('addRowBtn').addEventListener('click', () => {
                state.rows++;
                renderGrid();
                updateLayoutInfo();
            });

            document.getElementById('removeRowBtn').addEventListener('click', () => {
                if (state.rows > 1) {
                    state.rows--;
                    renderGrid();
                    updateLayoutInfo();
                }
            });

            document.getElementById('addColBtn').addEventListener('click', () => {
                state.cols++;
                renderGrid();
                updateLayoutInfo();
            });

            document.getElementById('removeColBtn').addEventListener('click', () => {
                if (state.cols > 1) {
                    state.cols--;
                    renderGrid();
                    updateLayoutInfo();
                }
            });

            document.getElementById('exportBtn').addEventListener('click', exportImage);

            const globalDropZone = document.getElementById('globalDropZone');
            globalDropZone.addEventListener('dragover', (e) => {
                e.preventDefault();
                globalDropZone.classList.add('dragover');
            });
            globalDropZone.addEventListener('dragleave', () => {
                globalDropZone.classList.remove('dragover');
            });
            globalDropZone.addEventListener('drop', (e) => {
                e.preventDefault();
                globalDropZone.classList.remove('dragover');
                const files = Array.from(e.dataTransfer.files).filter(f => f.type.startsWith('image/'));
                if (files.length > 0) {
                    batchUpload(files);
                }
            });
            globalDropZone.addEventListener('click', () => {
                const input = document.createElement('input');
                input.type = 'file';
                input.accept = 'image/*';
                input.multiple = true;
                input.onchange = (e) => {
                    const files = Array.from(e.target.files);
                    if (files.length > 0) {
                        batchUpload(files);
                    }
                };
                input.click();
            });
        }

        function updateLayoutInfo() {
            const total = state.cols * state.rows;
            document.getElementById('layoutInfo').textContent = `当前: ${state.cols}列 × ${state.rows}行 (${total}人)`;
        }

        function renderGrid() {
            const container = document.getElementById('gridContainer');
            const totalCells = state.cols * state.rows;
            
            container.style.gridTemplateColumns = `repeat(${state.cols}, 1fr)`;
            container.style.gridTemplateRows = `repeat(${state.rows}, 1fr)`;
            container.innerHTML = '';

            for (let i = 0; i < totalCells; i++) {
                const cell = state.cells[i] || { avatar: null, name: '' };
                const transform = state.avatarTransforms[i] || { scale: 1, x: 0, y: 0 };
                
                const cellEl = document.createElement('div');
                cellEl.className = 'grid-cell' + (cell.avatar ? ' has-avatar' : '');
                cellEl.dataset.index = i;

                const cellInner = document.createElement('div');
                cellInner.style.cssText = 'position:relative;width:100%;height:100%;';

                if (cell.avatar) {
                    const avatarDiv = document.createElement('div');
                    avatarDiv.className = 'cell-avatar';
                    
                    const avatarImg = document.createElement('img');
                    avatarImg.src = cell.avatar;
                    avatarImg.style.transform = `translate(${transform.x}px, ${transform.y}px) scale(${transform.scale})`;
                    avatarImg.dataset.index = i;
                    avatarImg.draggable = false;
                    
                    avatarDiv.appendChild(avatarImg);
                    cellInner.appendChild(avatarDiv);

                    initDragMove(i, avatarImg);
                }

                const imageControls = document.createElement('div');
                imageControls.className = 'image-controls';
                
                const zoomInBtn = document.createElement('button');
                zoomInBtn.className = 'control-btn';
                zoomInBtn.innerHTML = '+';
                zoomInBtn.title = '放大';
                zoomInBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    e.preventDefault();
                    zoomImage(i, 1.02);
                });
                
                const zoomOutBtn = document.createElement('button');
                zoomOutBtn.className = 'control-btn';
                zoomOutBtn.innerHTML = '−';
                zoomOutBtn.title = '缩小';
                zoomOutBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    e.preventDefault();
                    zoomImage(i, 0.98);
                });
                
                const resetBtn = document.createElement('button');
                resetBtn.className = 'control-btn';
                resetBtn.innerHTML = '↺';
                resetBtn.title = '重置';
                resetBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    e.preventDefault();
                    resetImage(i);
                });
                
                imageControls.appendChild(zoomOutBtn);
                imageControls.appendChild(zoomInBtn);
                imageControls.appendChild(resetBtn);
                cellInner.appendChild(imageControls);

                if (cell.avatar) {
                    const directionControls = document.createElement('div');
                    directionControls.className = 'direction-controls';
                    
                    const moveUpBtn = document.createElement('button');
                    moveUpBtn.className = 'control-btn';
                    moveUpBtn.innerHTML = '↑';
                    moveUpBtn.title = '上移';
                    moveUpBtn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        e.preventDefault();
                        moveImage(i, 0, -3);
                    });
                    
                    const moveDownBtn = document.createElement('button');
                    moveDownBtn.className = 'control-btn';
                    moveDownBtn.innerHTML = '↓';
                    moveDownBtn.title = '下移';
                    moveDownBtn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        e.preventDefault();
                        moveImage(i, 0, 3);
                    });
                    
                    const moveLeftBtn = document.createElement('button');
                    moveLeftBtn.className = 'control-btn';
                    moveLeftBtn.innerHTML = '←';
                    moveLeftBtn.title = '左移';
                    moveLeftBtn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        e.preventDefault();
                        moveImage(i, -3, 0);
                    });
                    
                    const moveRightBtn = document.createElement('button');
                    moveRightBtn.className = 'control-btn';
                    moveRightBtn.innerHTML = '→';
                    moveRightBtn.title = '右移';
                    moveRightBtn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        e.preventDefault();
                        moveImage(i, 3, 0);
                    });
                    
                    const topRow = document.createElement('div');
                    topRow.className = 'direction-row';
                    topRow.appendChild(moveUpBtn);
                    
                    const middleRow = document.createElement('div');
                    middleRow.className = 'direction-row';
                    middleRow.appendChild(moveLeftBtn);
                    middleRow.appendChild(moveRightBtn);
                    
                    const bottomRow = document.createElement('div');
                    bottomRow.className = 'direction-row';
                    bottomRow.appendChild(moveDownBtn);
                    
                    directionControls.appendChild(topRow);
                    directionControls.appendChild(middleRow);
                    directionControls.appendChild(bottomRow);
                    cellInner.appendChild(directionControls);
                }

                const overlay = document.createElement('div');
                overlay.className = 'cell-upload-overlay';
                
                const uploadTrigger = document.createElement('span');
                uploadTrigger.className = 'upload-trigger';
                uploadTrigger.innerHTML = cell.avatar ? '更换头像' : '点击上传';
                uploadTrigger.addEventListener('click', (e) => {
                    e.stopPropagation();
                    e.preventDefault();
                    openAvatarUpload(i);
                });
                
                overlay.appendChild(uploadTrigger);
                cellInner.appendChild(overlay);

                const nameBox = document.createElement('div');
                nameBox.className = 'cell-name-box';
                
                const micIcon = document.createElement('span');
                micIcon.className = 'cell-mic-icon';
                micIcon.innerHTML = '<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>';
                
                const nameInput = document.createElement('span');
                nameInput.className = 'cell-name-input';
                nameInput.contentEditable = 'true';
                nameInput.dataset.placeholder = '姓名';
                nameInput.textContent = cell.name || '';
                nameInput.addEventListener('input', (e) => {
                    state.cells[i] = state.cells[i] || { avatar: null, name: '' };
                    state.cells[i].name = e.target.textContent;
                });
                nameInput.addEventListener('click', (e) => e.stopPropagation());
                nameInput.addEventListener('mousedown', (e) => e.stopPropagation());

                nameBox.appendChild(micIcon);
                nameBox.appendChild(nameInput);

                cellInner.appendChild(nameBox);

                cellEl.appendChild(cellInner);

                cellEl.addEventListener('dragover', (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    cellEl.classList.add('drag-over');
                });

                cellEl.addEventListener('dragleave', (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    cellEl.classList.remove('drag-over');
                });

                cellEl.addEventListener('drop', (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    cellEl.classList.remove('drag-over');
                    const files = Array.from(e.dataTransfer.files).filter(f => f.type.startsWith('image/'));
                    if (files.length > 0) {
                        handleAvatarUpload(i, files[0]);
                    }
                });

                cellEl.addEventListener('click', (e) => {
                    if (!e.target.closest('.cell-avatar img') && !e.target.closest('.image-controls') && !e.target.closest('.direction-controls') && !e.target.closest('.cell-name-input') && !e.target.closest('.upload-trigger')) {
                        openAvatarUpload(i);
                    }
                });

                container.appendChild(cellEl);
            }
        }

        function initDragMove(index, img) {
            let isDragging = false;
            let startX, startY, startTranslateX, startTranslateY;
            
            img.addEventListener('mousedown', (e) => {
                if (e.button !== 0) return;
                e.stopPropagation();
                e.preventDefault();
                isDragging = true;
                startX = e.clientX;
                startY = e.clientY;
                
                if (!state.avatarTransforms[index]) {
                    state.avatarTransforms[index] = { scale: 1, x: 0, y: 0 };
                }
                startTranslateX = state.avatarTransforms[index].x;
                startTranslateY = state.avatarTransforms[index].y;
                
                document.addEventListener('mousemove', onMouseMove);
                document.addEventListener('mouseup', onMouseUp);
                
                return false;
            });
            
            function onMouseMove(e) {
                if (!isDragging) return;
                
                const dx = e.clientX - startX;
                const dy = e.clientY - startY;
                
                if (!state.avatarTransforms[index]) {
                    state.avatarTransforms[index] = { scale: 1, x: 0, y: 0 };
                }
                state.avatarTransforms[index].x = startTranslateX + dx;
                state.avatarTransforms[index].y = startTranslateY + dy;
                
                img.style.transform = `translate(${state.avatarTransforms[index].x}px, ${state.avatarTransforms[index].y}px) scale(${state.avatarTransforms[index].scale})`;
            }
            
            function onMouseUp() {
                isDragging = false;
                document.removeEventListener('mousemove', onMouseMove);
                document.removeEventListener('mouseup', onMouseUp);
            }
        }

        function moveImage(index, dx, dy) {
            state.avatarTransforms[index] = state.avatarTransforms[index] || { scale: 1, x: 0, y: 0 };
            state.avatarTransforms[index].x += dx;
            state.avatarTransforms[index].y += dy;
            
            const img = document.querySelector(`.cell-avatar img[data-index="${index}"]`);
            if (img) {
                img.style.transform = `translate(${state.avatarTransforms[index].x}px, ${state.avatarTransforms[index].y}px) scale(${state.avatarTransforms[index].scale})`;
            }
        }

        function zoomImage(index, factor) {
            state.avatarTransforms[index] = state.avatarTransforms[index] || { scale: 1, x: 0, y: 0 };
            const newScale = Math.max(0.3, Math.min(5, state.avatarTransforms[index].scale * factor));
            state.avatarTransforms[index].scale = newScale;
            
            const img = document.querySelector(`.cell-avatar img[data-index="${index}"]`);
            if (img) {
                img.style.transform = `translate(${state.avatarTransforms[index].x}px, ${state.avatarTransforms[index].y}px) scale(${state.avatarTransforms[index].scale})`;
            }
        }

        function resetImage(index) {
            state.avatarTransforms[index] = { scale: 1, x: 0, y: 0 };
            
            const img = document.querySelector(`.cell-avatar img[data-index="${index}"]`);
            if (img) {
                img.style.transform = 'translate(0px, 0px) scale(1)';
            }
        }

        function openAvatarUpload(index) {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.onchange = async (e) => {
                const file = e.target.files[0];
                if (file) {
                    await handleAvatarUpload(index, file);
                }
            };
            input.click();
        }

        async function handleAvatarUpload(index, file) {
            showLoading('正在处理...');
            
            const reader = new FileReader();
            reader.onload = async (e) => {
                try {
                    state.cells[index] = state.cells[index] || { avatar: null, name: '' };
                    state.cells[index].avatar = e.target.result;
                    state.avatarTransforms[index] = state.avatarTransforms[index] || { scale: 1, x: 0, y: 0 };
                    
                    renderGrid();
                    hideLoading();
                    showToast('头像上传成功', 'success');
                } catch (error) {
                    console.error('处理失败:', error);
                    hideLoading();
                    showToast('头像处理失败', 'error');
                }
            };
            reader.onerror = () => {
                hideLoading();
                showToast('头像读取失败', 'error');
            };
            reader.readAsDataURL(file);
        }

        async function batchUpload(files) {
            let uploaded = 0;
            const totalCells = state.cols * state.rows;

            for (const file of files) {
                const currentIndex = findNextEmptyCell();
                if (currentIndex === -1) {
                    break;
                }

                const dataUrl = await readFileAsDataURL(file);
                state.cells[currentIndex] = { avatar: dataUrl, name: '' };
                state.avatarTransforms[currentIndex] = { scale: 1, x: 0, y: 0 };
                uploaded++;
            }

            if (uploaded > 0) {
                renderGrid();
                showToast(`成功导入 ${uploaded} 张图片`, 'success');
            } else {
                showToast('所有格子已满，请先调整行列数', 'error');
            }
        }

        function readFileAsDataURL(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (e) => resolve(e.target.result);
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }

        function findNextEmptyCell() {
            const totalCells = state.cols * state.rows;
            for (let i = 0; i < totalCells; i++) {
                if (!state.cells[i] || !state.cells[i].avatar) {
                    return i;
                }
            }
            return -1;
        }

        async function exportImage() {
            showLoading('正在导出，请稍候...');
            
            const container = document.getElementById('gridContainer');
            
            try {
                const dataUrl = await domtoimage.toPng(container, {
                    quality: 1,
                    pixelRatio: 2,
                    bgcolor: '#000000',
                    style: {
                        transform: 'scale(1)',
                        transformOrigin: 'top left'
                    }
                });
                
                const totalCells = state.cols * state.rows;
                const link = document.createElement('a');
                link.download = `会议合影_${state.cols}x${state.rows}_${totalCells}人.png`;
                link.href = dataUrl;
                link.click();
                
                hideLoading();
                showToast('合影导出成功', 'success');
            } catch (error) {
                console.error('导出失败:', error);
                hideLoading();
                showToast('导出失败', 'error');
            }
        }

        function showLoading(text) {
            document.getElementById('loadingText').textContent = text;
            document.getElementById('loadingOverlay').classList.add('active');
        }

        function hideLoading() {
            document.getElementById('loadingOverlay').classList.remove('active');
        }

        function showToast(message, type = '') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast ' + type;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        init();
    </script>
</body>
</html>
