<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>腾讯会议合影生成器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
            background: #f5f7fa;
            min-height: 100vh;
            color: #333;
        }

        .app-container {
            display: flex;
            min-height: 100vh;
        }

        .control-panel {
            width: 320px;
            background: #fff;
            padding: 24px;
            box-shadow: 2px 0 8px rgba(0,0,0,0.08);
            display: flex;
            flex-direction: column;
            gap: 24px;
            overflow-y: auto;
        }

        .panel-title {
            font-size: 20px;
            font-weight: 600;
            color: #1890ff;
            padding-bottom: 16px;
            border-bottom: 2px solid #e8f4ff;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .panel-title::before {
            content: "◈";
            font-size: 18px;
        }

        .section {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .section-label {
            font-size: 14px;
            font-weight: 600;
            color: #333;
        }

        .grid-options {
            display: flex;
            gap: 8px;
        }

        .grid-btn {
            flex: 1;
            padding: 12px 8px;
            border: 2px solid #e0e0e0;
            background: #fff;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            color: #666;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .grid-btn:hover {
            border-color: #1890ff;
            color: #1890ff;
        }

        .grid-btn.active {
            border-color: #1890ff;
            background: #e6f7ff;
            color: #1890ff;
        }

        .grid-btn span {
            font-size: 18px;
        }

        .upload-area {
            border: 2px dashed #ccc;
            border-radius: 12px;
            padding: 24px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #fafafa;
        }

        .upload-area:hover {
            border-color: #1890ff;
            background: #e6f7ff;
        }

        .upload-area.has-bg {
            border-style: solid;
            border-color: #52c41a;
            background: #f6ffed;
        }

        .upload-icon {
            font-size: 32px;
            color: #999;
            margin-bottom: 8px;
        }

        .upload-area:hover .upload-icon {
            color: #1890ff;
        }

        .upload-text {
            font-size: 14px;
            color: #666;
        }

        .upload-hint {
            font-size: 12px;
            color: #999;
            margin-top: 4px;
        }

        .bg-preview {
            max-width: 100%;
            max-height: 120px;
            border-radius: 8px;
            object-fit: contain;
        }

        .export-btn {
            margin-top: auto;
            padding: 14px 24px;
            background: linear-gradient(135deg, #1890ff 0%, #096dd9 100%);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(24, 144, 255, 0.3);
        }

        .export-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(24, 144, 255, 0.4);
        }

        .export-btn:active {
            transform: translateY(0);
        }

        .preview-area {
            flex: 1;
            padding: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }

        .preview-header {
            font-size: 18px;
            font-weight: 600;
            color: #333;
        }

        .grid-container {
            display: grid;
            gap: 1px;
            background: #000;
            box-shadow: 0 4px 16px rgba(0,0,0,0.1);
            width: 80vw;
            max-width: 1200px;
            aspect-ratio: 4 / 3;
        }

        .grid-cell {
            position: relative;
            background-size: cover;
            background-position: center;
            background-color: #fff;
            overflow: hidden;
            cursor: pointer;
            display: flex;
            align-items: flex-end;
            justify-content: center;
        }

        .grid-cell:hover {
            z-index: 1;
            outline: 2px solid #1890ff;
        }

        .cell-avatar {
            position: absolute;
            bottom: 12%;
            left: 50%;
            transform: translateX(-50%);
            width: 75%;
            height: 65%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .cell-avatar img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .cell-avatar-placeholder {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: rgba(255,255,255,0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: #bbb;
        }

        .cell-name-box {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 40%;
            height: 10%;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            padding: 0 8px;
            gap: 4px;
        }

        .cell-mic-icon {
            font-size: 10px;
            color: #fff;
            flex-shrink: 0;
        }

        .cell-name-input {
            flex: 1;
            background: transparent;
            border: none;
            color: #fff;
            font-size: 10px;
            text-align: left;
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            outline: none;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .cell-name-input::placeholder {
            color: rgba(255,255,255,0.5);
        }

        .cell-upload-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            display: none;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 14px;
            border-radius: 4px;
        }

        .grid-cell:hover .cell-upload-overlay {
            display: flex;
        }

        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 16px;
            z-index: 1000;
        }

        .loading-overlay.active {
            display: flex;
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            color: #fff;
            font-size: 16px;
        }

        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: #333;
            color: #fff;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s ease;
            z-index: 1001;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        .toast.success {
            background: #52c41a;
        }

        .toast.error {
            background: #ff4d4f;
        }

        .hidden-input {
            display: none;
        }

        .tips {
            font-size: 12px;
            color: #999;
            padding: 12px;
            background: #f9f9f9;
            border-radius: 8px;
            line-height: 1.6;
        }

        .tips strong {
            color: #666;
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-size: 14px;
            color: #333;
        }

        .checkbox-label input {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="control-panel">
            <div class="panel-title">腾讯会议合影生成器</div>
            
            <div class="section">
                <div class="section-label">选择宫格</div>
                <div class="grid-options">
                    <button class="grid-btn active" data-grid="9">
                        <span>▦</span>
                        9宫格
                    </button>
                    <button class="grid-btn" data-grid="20">
                        <span>▦▦</span>
                        20宫格
                    </button>
                    <button class="grid-btn" data-grid="25">
                        <span>▦▦▦</span>
                        25宫格
                    </button>
                </div>
            </div>

            <div class="section">
                <div class="section-label">上传背景图片</div>
                <div class="upload-area" id="bgUpload">
                    <div class="upload-icon">🖼️</div>
                    <div class="upload-text">点击或拖拽上传背景</div>
                    <div class="upload-hint">支持 JPG、PNG 格式</div>
                </div>
                <img class="bg-preview hidden" id="bgPreview" alt="背景预览">
            </div>

            <div class="section">
                <label class="checkbox-label">
                    <input type="checkbox" id="removeBgCheckbox" checked>
                    <span>自动抠图（去除背景）</span>
                </label>
            </div>

            <div class="tips">
                <strong>使用说明：</strong><br>
                1. 选择宫格数量<br>
                2. 上传统一的背景图片<br>
                3. 点击每个格子上传人物头像（自动抠图）<br>
                4. 在左下角输入参会人姓名<br>
                5. 点击导出按钮保存合影
            </div>

            <button class="export-btn" id="exportBtn">📥 导出合影</button>
        </div>

        <div class="preview-area">
            <div class="preview-header">合影预览</div>
            <div class="grid-container" id="gridContainer"></div>
        </div>
    </div>

    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner"></div>
        <div class="loading-text" id="loadingText">正在处理...</div>
    </div>

    <div class="toast" id="toast"></div>

    <input type="file" class="hidden-input" id="bgInput" accept="image/*">
    <input type="file" class="hidden-input" id="avatarInput" accept="image/*">

    <script>
        const state = {
            gridType: 9,
            backgroundImage: null,
            cells: []
        };

        const gridConfigs = {
            9: { cols: 3, rows: 3, width: 280, height: 210 },
            20: { cols: 4, rows: 5, width: 220, height: 165 },
            25: { cols: 5, rows: 5, width: 200, height: 150 }
        };

        function init() {
            setupEventListeners();
            renderGrid();
        }

        function setupEventListeners() {
            document.querySelectorAll('.grid-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.grid-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    state.gridType = parseInt(btn.dataset.grid);
                    state.cells = [];
                    renderGrid();
                });
            });

            const bgUpload = document.getElementById('bgUpload');
            const bgInput = document.getElementById('bgInput');

            bgUpload.addEventListener('click', () => bgInput.click());
            bgUpload.addEventListener('dragover', (e) => {
                e.preventDefault();
                bgUpload.style.borderColor = '#1890ff';
            });
            bgUpload.addEventListener('dragleave', () => {
                bgUpload.style.borderColor = '#ccc';
            });
            bgUpload.addEventListener('drop', (e) => {
                e.preventDefault();
                bgUpload.style.borderColor = '#ccc';
                const file = e.dataTransfer.files[0];
                if (file && file.type.startsWith('image/')) {
                    handleBackgroundUpload(file);
                }
            });

            bgInput.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (file) handleBackgroundUpload(file);
            });

            document.getElementById('exportBtn').addEventListener('click', exportImage);
        }

        function handleBackgroundUpload(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                state.backgroundImage = e.target.result;
                const bgPreview = document.getElementById('bgPreview');
                bgPreview.src = state.backgroundImage;
                bgPreview.classList.remove('hidden');
                document.getElementById('bgUpload').classList.add('has-bg');
                renderGrid();
                showToast('背景图片上传成功', 'success');
            };
            reader.readAsDataURL(file);
        }

        function renderGrid() {
            const config = gridConfigs[state.gridType];
            const container = document.getElementById('gridContainer');
            
            container.style.gridTemplateColumns = `repeat(${config.cols}, 1fr)`;
            container.style.gridTemplateRows = `repeat(${config.rows}, 1fr)`;
            container.innerHTML = '';

            for (let i = 0; i < state.gridType; i++) {
                const cell = state.cells[i] || { avatar: null, name: '' };
                
                const cellEl = document.createElement('div');
                cellEl.className = 'grid-cell';
                
                if (state.backgroundImage) {
                    cellEl.style.backgroundImage = `url(${state.backgroundImage})`;
                }

                const avatarArea = document.createElement('div');
                avatarArea.className = 'cell-avatar';
                
                if (cell.avatar) {
                    const img = document.createElement('img');
                    img.src = cell.avatar;
                    avatarArea.appendChild(img);
                } else {
                    const placeholder = document.createElement('div');
                    placeholder.className = 'cell-avatar-placeholder';
                    placeholder.innerHTML = '👤';
                    avatarArea.appendChild(placeholder);
                }

                const overlay = document.createElement('div');
                overlay.className = 'cell-upload-overlay';
                overlay.innerHTML = '点击上传头像';
                overlay.addEventListener('click', (e) => {
                    e.stopPropagation();
                    openAvatarUpload(i);
                });

                const nameBox = document.createElement('div');
                nameBox.className = 'cell-name-box';
                
                const micIcon = document.createElement('span');
                micIcon.className = 'cell-mic-icon';
                micIcon.innerHTML = '🎤';
                
                const nameInput = document.createElement('input');
                nameInput.type = 'text';
                nameInput.className = 'cell-name-input';
                nameInput.placeholder = '姓名 院校名称';
                nameInput.value = cell.name;
                nameInput.maxLength = 30;
                nameInput.addEventListener('input', (e) => {
                    state.cells[i] = state.cells[i] || { avatar: null, name: '' };
                    state.cells[i].name = e.target.value;
                });
                nameInput.addEventListener('click', (e) => e.stopPropagation());

                nameBox.appendChild(micIcon);
                nameBox.appendChild(nameInput);

                cellEl.appendChild(avatarArea);
                cellEl.appendChild(overlay);
                cellEl.appendChild(nameBox);
                cellEl.addEventListener('click', () => openAvatarUpload(i));

                container.appendChild(cellEl);
            }
        }

        function openAvatarUpload(index) {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.onchange = async (e) => {
                const file = e.target.files[0];
                if (file) {
                    await handleAvatarUpload(index, file);
                }
            };
            input.click();
        }

        async function handleAvatarUpload(index, file) {
            const shouldRemoveBg = document.getElementById('removeBgCheckbox')?.checked ?? true;
            showLoading(shouldRemoveBg ? '正在抠图，请稍候...' : '正在处理，请稍候...');
            
            const reader = new FileReader();
            reader.onload = async (e) => {
                try {
                    let blob;
                    if (shouldRemoveBg) {
                        blob = await removeBackground(e.target.result);
                    } else {
                        const response = await fetch(e.target.result);
                        blob = await response.blob();
                    }
                    const url = URL.createObjectURL(blob);
                    
                    state.cells[index] = state.cells[index] || { avatar: null, name: '' };
                    state.cells[index].avatar = url;
                    
                    renderGrid();
                    hideLoading();
                    showToast(shouldRemoveBg ? '头像上传并抠图成功' : '头像上传成功', 'success');
                } catch (error) {
                    console.error('处理失败:', error);
                    hideLoading();
                    
                    state.cells[index] = state.cells[index] || { avatar: null, name: '' };
                    state.cells[index].avatar = e.target.result;
                    renderGrid();
                    showToast('头像上传成功', 'error');
                }
            };
            reader.readAsDataURL(file);
        }

        async function removeBackground(imageDataUrl) {
            return await kmeansBackgroundRemoval(imageDataUrl);
        }

        function kmeansBackgroundRemoval(imageDataUrl) {
            return new Promise((resolve, reject) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    
                    const maxSize = 600;
                    let width = img.width;
                    let height = img.height;
                    
                    if (width > maxSize || height > maxSize) {
                        if (width > height) {
                            height = (height / width) * maxSize;
                            width = maxSize;
                        } else {
                            width = (width / height) * maxSize;
                            height = maxSize;
                        }
                    }
                    
                    canvas.width = width;
                    canvas.height = height;
                    ctx.drawImage(img, 0, 0, width, height);
                    
                    const imageData = ctx.getImageData(0, 0, width, height);
                    const pixels = [];
                    
                    for (let i = 0; i < imageData.data.length; i += 4) {
                        if (imageData.data[i + 3] > 128) {
                            pixels.push([
                                imageData.data[i],
                                imageData.data[i + 1],
                                imageData.data[i + 2]
                            ]);
                        }
                    }
                    
                    const k = 5;
                    const centroids = [];
                    for (let i = 0; i < k; i++) {
                        centroids.push(pixels[Math.floor(Math.random() * pixels.length)]);
                    }
                    
                    for (let iter = 0; iter < 10; iter++) {
                        const clusters = Array.from({length: k}, () => []);
                        
                        for (const pixel of pixels) {
                            let minDist = Infinity;
                            let closest = 0;
                            for (let i = 0; i < k; i++) {
                                const dist = Math.sqrt(
                                    Math.pow(pixel[0] - centroids[i][0], 2) +
                                    Math.pow(pixel[1] - centroids[i][1], 2) +
                                    Math.pow(pixel[2] - centroids[i][2], 2)
                                );
                                if (dist < minDist) {
                                    minDist = dist;
                                    closest = i;
                                }
                            }
                            clusters[closest].push(pixel);
                        }
                        
                        for (let i = 0; i < k; i++) {
                            if (clusters[i].length > 0) {
                                centroids[i] = [
                                    clusters[i].reduce((sum, p) => sum + p[0], 0) / clusters[i].length,
                                    clusters[i].reduce((sum, p) => sum + p[1], 0) / clusters[i].length,
                                    clusters[i].reduce((sum, p) => sum + p[2], 0) / clusters[i].length
                                ];
                            }
                        }
                    }
                    
                    const edgePixels = [];
                    const edgeCount = Math.floor(width * 0.1);
                    for (let y = 0; y < height; y++) {
                        for (let i = 0; i < edgeCount; i++) {
                            const idxLeft = (y * width + i) * 4;
                            const idxRight = (y * width + width - 1 - i) * 4;
                            if (imageData.data[idxLeft + 3] > 128) {
                                edgePixels.push([
                                    imageData.data[idxLeft],
                                    imageData.data[idxLeft + 1],
                                    imageData.data[idxLeft + 2]
                                ]);
                            }
                            if (imageData.data[idxRight + 3] > 128) {
                                edgePixels.push([
                                    imageData.data[idxRight],
                                    imageData.data[idxRight + 1],
                                    imageData.data[idxRight + 2]
                                ]);
                            }
                        }
                    }
                    for (let x = 0; x < width; x++) {
                        for (let i = 0; i < edgeCount; i++) {
                            const idxTop = (i * width + x) * 4;
                            const idxBottom = ((height - 1 - i) * width + x) * 4;
                            if (imageData.data[idxTop + 3] > 128) {
                                edgePixels.push([
                                    imageData.data[idxTop],
                                    imageData.data[idxTop + 1],
                                    imageData.data[idxTop + 2]
                                ]);
                            }
                            if (imageData.data[idxBottom + 3] > 128) {
                                edgePixels.push([
                                    imageData.data[idxBottom],
                                    imageData.data[idxBottom + 1],
                                    imageData.data[idxBottom + 2]
                                ]);
                            }
                        }
                    }
                    
                    let bgCentroid = [0, 0, 0];
                    if (edgePixels.length > 0) {
                        bgCentroid = [
                            edgePixels.reduce((sum, p) => sum + p[0], 0) / edgePixels.length,
                            edgePixels.reduce((sum, p) => sum + p[1], 0) / edgePixels.length,
                            edgePixels.reduce((sum, p) => sum + p[2], 0) / edgePixels.length
                        ];
                    }
                    
                    let maxDist = 0;
                    let fgCentroid = centroids[0];
                    for (const c of centroids) {
                        const dist = Math.sqrt(
                            Math.pow(c[0] - bgCentroid[0], 2) +
                            Math.pow(c[1] - bgCentroid[1], 2) +
                            Math.pow(c[2] - bgCentroid[2], 2)
                        );
                        if (dist > maxDist) {
                            maxDist = dist;
                            fgCentroid = c;
                        }
                    }
                    
                    const resultData = ctx.createImageData(width, height);
                    
                    for (let i = 0; i < imageData.data.length; i += 4) {
                        const r = imageData.data[i];
                        const g = imageData.data[i + 1];
                        const b = imageData.data[i + 2];
                        const a = imageData.data[i + 3];
                        
                        if (a < 50) {
                            resultData.data[i + 3] = 0;
                            continue;
                        }
                        
                        const dist = Math.sqrt(
                            Math.pow(r - bgCentroid[0], 2) +
                            Math.pow(g - bgCentroid[1], 2) +
                            Math.pow(b - bgCentroid[2], 2)
                        );
                        
                        const threshold = maxDist * 0.5;
                        let alpha = 0;
                        if (dist < threshold * 0.3) {
                            alpha = 0;
                        } else if (dist > threshold) {
                            alpha = 255;
                        } else {
                            alpha = Math.floor(255 * (dist - threshold * 0.3) / (threshold * 0.7));
                        }
                        
                        const x = (i / 4) % width;
                        const y = Math.floor((i / 4) / width);
                        const edgeDist = Math.min(x, width - x, y, height - y);
                        const edgeFactor = Math.max(0, 1 - edgeDist / 20);
                        alpha = Math.max(0, Math.min(255, alpha - edgeFactor * 30));
                        
                        resultData.data[i] = r;
                        resultData.data[i + 1] = g;
                        resultData.data[i + 2] = b;
                        resultData.data[i + 3] = alpha;
                    }
                    
                    ctx.putImageData(resultData, 0, 0);
                    canvas.toBlob((blob) => {
                        if (blob) {
                            resolve(blob);
                        } else {
                            reject(new Error('抠图失败'));
                        }
                    }, 'image/png');
                };
                img.onerror = reject;
                img.src = imageDataUrl;
            });
        }

        function simpleBackgroundRemoval(imageDataUrl) {
            return new Promise((resolve, reject) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    
                    const maxSize = 800;
                    let width = img.width;
                    let height = img.height;
                    
                    if (width > maxSize || height > maxSize) {
                        if (width > height) {
                            height = (height / width) * maxSize;
                            width = maxSize;
                        } else {
                            width = (width / height) * maxSize;
                            height = maxSize;
                        }
                    }
                    
                    canvas.width = width;
                    canvas.height = height;
                    ctx.drawImage(img, 0, 0, width, height);
                    
                    const imageData = ctx.getImageData(0, 0, width, height);
                    const data = imageData.data;
                    const resultData = ctx.createImageData(width, height);
                    const result = resultData.data;
                    
                    const cornerSamples = [];
                    const edgePoints = 10;
                    for (let i = 0; i < edgePoints; i++) {
                        cornerSamples.push({x: i, y: 0});
                        cornerSamples.push({x: width - 1 - i, y: 0});
                        cornerSamples.push({x: i, y: height - 1});
                        cornerSamples.push({x: width - 1 - i, y: height - 1});
                        cornerSamples.push({x: Math.floor(width/2), y: i});
                        cornerSamples.push({x: Math.floor(width/2), y: height - 1 - i});
                        cornerSamples.push({x: i, y: Math.floor(height/2)});
                        cornerSamples.push({x: width - 1 - i, y: Math.floor(height/2)});
                    }
                    
                    let bgR = 0, bgG = 0, bgB = 0, count = 0;
                    for (const sample of cornerSamples) {
                        const idx = (sample.y * width + sample.x) * 4;
                        bgR += data[idx];
                        bgG += data[idx + 1];
                        bgB += data[idx + 2];
                        count++;
                    }
                    bgR = Math.floor(bgR / count);
                    bgG = Math.floor(bgG / count);
                    bgB = Math.floor(bgB / count);
                    
                    const centerX = Math.floor(width / 2);
                    const centerY = Math.floor(height / 2);
                    let fgR = 0, fgG = 0, fgB = 0, fgCount = 0;
                    for (let dy = -Math.floor(height/4); dy <= Math.floor(height/4); dy += 4) {
                        for (let dx = -Math.floor(width/4); dx <= Math.floor(width/4); dx += 4) {
                            const x = centerX + dx;
                            const y = centerY + dy;
                            if (x > 0 && x < width - 1 && y > 0 && y < height - 1) {
                                const idx = (y * width + x) * 4;
                                fgR += data[idx];
                                fgG += data[idx + 1];
                                fgB += data[idx + 2];
                                fgCount++;
                            }
                        }
                    }
                    fgR = Math.floor(fgR / fgCount);
                    fgG = Math.floor(fgG / fgCount);
                    fgB = Math.floor(fgB / fgCount);
                    
                    const bgColor = {r: bgR, g: bgG, b: bgB};
                    const fgColor = {r: fgR, g: fgG, b: fgB};
                    
                    for (let i = 0; i < data.length; i += 4) {
                        const r = data[i];
                        const g = data[i + 1];
                        const b = data[i + 2];
                        const a = data[i + 3];
                        
                        if (a < 50) {
                            result[i + 3] = 0;
                            continue;
                        }
                        
                        const bgDist = Math.sqrt(
                            Math.pow(r - bgColor.r, 2) +
                            Math.pow(g - bgColor.g, 2) +
                            Math.pow(b - bgColor.b, 2)
                        );
                        
                        const fgDist = Math.sqrt(
                            Math.pow(r - fgColor.r, 2) +
                            Math.pow(g - fgColor.g, 2) +
                            Math.pow(b - fgColor.b, 2)
                        );
                        
                        const edgeX = (i / 4) % width;
                        const edgeY = Math.floor((i / 4) / width);
                        const edgeDist = Math.min(edgeX, width - edgeX, edgeY, height - edgeY);
                        const edgeFactor = Math.max(0, 1 - edgeDist / 30);
                        
                        const threshold = 80;
                        const softness = 30;
                        
                        let alpha = 0;
                        if (bgDist < threshold - softness) {
                            alpha = 0;
                        } else if (bgDist > threshold + softness) {
                            alpha = 255;
                        } else {
                            alpha = Math.floor(255 * (bgDist - (threshold - softness)) / (2 * softness));
                        }
                        
                        alpha = Math.max(0, Math.min(255, alpha - edgeFactor * 50));
                        
                        result[i] = r;
                        result[i + 1] = g;
                        result[i + 2] = b;
                        result[i + 3] = alpha;
                    }
                    
                    resultData.data = result;
                    ctx.putImageData(resultData, 0, 0);
                    canvas.toBlob((blob) => {
                        if (blob) {
                            resolve(blob);
                        } else {
                            reject(new Error('抠图失败'));
                        }
                    }, 'image/png');
                };
                img.onerror = reject;
                img.src = imageDataUrl;
            });
        }

        async function exportImage() {
            const container = document.getElementById('gridContainer');
            const containerRect = container.getBoundingClientRect();
            
            const config = gridConfigs[state.gridType];
            const cellWidth = containerRect.width / config.cols;
            const cellHeight = containerRect.height / config.rows;

            const canvas = document.createElement('canvas');
            canvas.width = containerRect.width;
            canvas.height = containerRect.height;
            const ctx = canvas.getContext('2d');

            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            for (let i = 0; i < state.gridType; i++) {
                const row = Math.floor(i / config.cols);
                const col = i % config.cols;
                const x = col * (cellWidth + 1);
                const y = row * (cellHeight + 1);

                if (state.backgroundImage) {
                    const img = await loadImage(state.backgroundImage);
                    ctx.save();
                    ctx.beginPath();
                    ctx.rect(x, y, cellWidth, cellHeight);
                    ctx.clip();
                    ctx.drawImage(img, x, y, cellWidth, cellHeight);
                    ctx.restore();
                }

                const cell = state.cells[i];
                if (cell && cell.avatar) {
                    const avatarImg = await loadImage(cell.avatar);
                    const avatarWidth = cellWidth * 0.75;
                    const avatarHeight = cellHeight * 0.65;
                    const avatarX = x + (cellWidth - avatarWidth) / 2;
                    const avatarY = y + cellHeight * 0.12;
                    
                    ctx.save();
                    ctx.beginPath();
                    ctx.rect(avatarX, avatarY, avatarWidth, avatarHeight);
                    ctx.clip();
                    ctx.drawImage(avatarImg, avatarX, avatarY, avatarWidth, avatarHeight);
                    ctx.restore();
                }

                ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
                const boxWidth = cellWidth * 0.4;
                const boxHeight = cellHeight * 0.1;
                const boxY = y + cellHeight - boxHeight;
                ctx.fillRect(x, boxY, boxWidth, boxHeight);

                if (cell && cell.name) {
                    ctx.fillStyle = '#ffffff';
                    ctx.font = `${Math.max(10, cellHeight * 0.08)}px "PingFang SC", "Microsoft YaHei", sans-serif`;
                    ctx.textAlign = 'left';
                    ctx.textBaseline = 'middle';
                    const textX = x + cellWidth * 0.03;
                    ctx.fillText(cell.name, textX, boxY + boxHeight / 2);
                }
            }

            canvas.toBlob((blob) => {
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `会议合影_${state.gridType}宫格.png`;
                a.click();
                URL.revokeObjectURL(url);
                showToast('合影导出成功', 'success');
            }, 'image/png');
        }

        function loadImage(src) {
            return new Promise((resolve, reject) => {
                const img = new Image();
                img.onload = () => resolve(img);
                img.onerror = reject;
                img.src = src;
            });
        }

        function showLoading(text) {
            document.getElementById('loadingText').textContent = text;
            document.getElementById('loadingOverlay').classList.add('active');
        }

        function hideLoading() {
            document.getElementById('loadingOverlay').classList.remove('active');
        }

        function showToast(message, type = '') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast ' + type;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
            if (w < 2 * r) r = w / 2;
            if (h < 2 * r) r = h / 2;
            this.beginPath();
            this.moveTo(x + r, y);
            this.arcTo(x + w, y, x + w, y + h, r);
            this.arcTo(x + w, y + h, x, y + h, r);
            this.arcTo(x, y + h, x, y, r);
            this.arcTo(x, y, x + w, y, r);
            this.closePath();
            return this;
        };

        init();
    </script>
